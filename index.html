<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Center - แอปโหราศาสตร์เวทอินเดีย</title>
    <style>
        body { font-family: 'Krub', sans-serif; margin: 0; background-color: #f4f4f9; color: #333; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
        
        /* 以前の横並びレイアウトを復元 */
        .content-wrapper { display: flex; flex-wrap: wrap; gap: 30px; padding: 40px 0; }
        .main-text { flex: 2; min-width: 300px; }
        .download-section { flex: 1; min-width: 250px; background-color: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        
        .download-button { display: block; margin: 12px auto; max-width: 180px; }
        .download-button img { width: 100%; height: auto; }

        /* スクリーンショット用スタイル */
        .sc-gallery { display: flex; overflow-x: auto; gap: 15px; padding: 20px 0; }
        .sc-gallery img { height: 300px; border-radius: 10px; }
        .sc-full { width: 100%; border-radius: 10px; margin-top: 15px; }
        .pdf-link-box { text-align: center; padding: 20px; }

        @media (max-width: 768px) { .content-wrapper { flex-direction: column; } }
    </style>
</head>
<body>
    <header><img src="header-visual.png" style="width:100%;" alt="Header"></header>
    
    <main class="container">
        <div class="content-wrapper">
            <div class="main-text">
                <h1>เปิดรหัสลับแห่งชีวิต: ปลดล็อกความสำเร็จด้วยโหราศาสตร์เวท</h1>
                <p>สัมผัสภูมิปัญญาเวทโบราณที่แม่นยำที่สุดผ่านระบบ AI อัจฉริยะ</p>
            </div>
            <div class="download-section">
                <h2>ดาวน์โหลดเลย!</h2>
                <a href="#" class="download-button"><img src="download-ios.png" alt="iOS"></a>
                <a href="#" class="download-button"><img src="download-android.png" alt="Android"></a>
                <a href="#" class="download-button"><img src="download-pc.png" alt="PC"></a>
            </div>
        </div>

        <section>
            <h2>ภาพตัวอย่างการใช้งาน</h2>
            <div class="sc-gallery">
                <img src="sc-1.jpg" alt="UI"><img src="sc-2.png" alt="UI"><img src="sc-3.jpg" alt="UI"><img src="sc-4.png" alt="UI">
            </div>
            <img src="sc-PDF1.png" alt="PDF" class="sc-full">
            <img src="sc-mail.png" alt="Mail" class="sc-full">
            <div class="pdf-link-box">
                <a href="https://drive.google.com/file/d/15uv755RzFNNwFOxfUq4SSOApueuFyvJV/view?usp=sharing" target="_blank">ดูตัวอย่างรายงานผลลัพธ์ฉบับเต็ม (PDF)</a>
            </div>
        </section>
    </main>
</body>
</html>
