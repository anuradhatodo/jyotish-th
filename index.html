<style>
    body { font-family: 'Krub', sans-serif; margin: 0; background-color: #f4f4f9; color: #333; line-height: 1.6; }
    h1 { font-size: 2rem; color: #4b0082; font-weight: 700; margin-bottom: 20px; }
    h2 { font-size: 1.4rem; color: #d4af37; margin-top: 20px; }
    .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
    
    /* ヘッダー画像 */
    header { background-color: #000; padding: 10px 0; }
    header img { max-width: 100%; height: auto; display: block; margin: 0 auto; }

    /* 全体レイアウト */
    .content-wrapper { display: flex; flex-wrap: wrap; gap: 20px; padding: 40px 0; align-items: flex-start; }
    .main-text { flex: 3; min-width: 300px; }
    
    /* ダウンロードセクションの最適化 */
    .download-section { 
        flex: 1; min-width: 250px; background-color: #fff; 
        padding: 20px; border-radius: 15px; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; 
    }
    .app-icon { width: 60px !important; margin-bottom: 10px; border-radius: 12px; }
    .download-button img { 
        max-width: 150px !important; /* ボタン画像サイズを制限 */
        width: 100%; height: auto; 
        margin-top: 10px; transition: transform 0.2s; 
    }

    /* 詳細画像 */
    .details-section { padding: 20px 0; text-align: center; }
    .details-section img { width: 100%; max-width: 700px; border-radius: 15px; }

    footer { background-color: #333; color: #fff; text-align: center; padding: 20px 0; }
    footer a { color: #d4af37; text-decoration: none; }

    /* スマホ向けレスポンシブ調整 */
    @media (max-width: 768px) {
        .content-wrapper { flex-direction: column; }
        h1 { font-size: 1.5rem; }
        .download-section { width: 100%; box-sizing: border-box; }
    }
</style>
