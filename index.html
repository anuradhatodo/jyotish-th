<style>
        body { font-family: 'Krub', sans-serif; margin: 0; background-color: #f4f4f9; color: #333; line-height: 1.6; }
        
        /* ヘッダー画像を左右いっぱいに表示 */
        header { background-color: #000; width: 100%; padding: 0; }
        header img { width: 100%; height: auto; display: block; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
        
        h1 { font-size: 2rem; color: #4b0082; font-weight: 700; margin-bottom: 20px; }
        h2 { font-size: 1.4rem; color: #d4af37; margin-top: 20px; }

        /* コンテンツの余白調整 */
        .content-wrapper { display: flex; flex-wrap: wrap; gap: 20px; padding: 40px 20px; box-sizing: border-box; }
        .main-text { flex: 3; min-width: 300px; }
        
        .download-section { 
            flex: 1; min-width: 250px; background-color: #fff; 
            padding: 20px; border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; 
        }
        .app-icon { width: 60px !important; margin-bottom: 10px; border-radius: 12px; }
        .download-button img { max-width: 150px !important; width: 100%; height: auto; margin-top: 10px; transition: transform 0.2s; display: block; margin-left: auto; margin-right: auto; }

        .details-section { padding: 40px 20px; text-align: center; box-sizing: border-box; }
        .details-section img { width: 100%; max-width: 700px; border-radius: 15px; }

        footer { background-color: #333; color: #fff; text-align: center; padding: 20px; }
        footer a { color: #d4af37; text-decoration: none; }

        /* スマホ向け調整 */
        @media (max-width: 768px) {
            .content-wrapper { flex-direction: column; padding: 20px; }
            h1 { font-size: 1.6rem; }
            .download-section { width: 100%; box-sizing: border-box; }
        }
    </style>
