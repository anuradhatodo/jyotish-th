<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Center - AI โหราศาสตร์เวทอินเดีย</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --deep-blue: #0f172a; --gold: #d4af37; --white: #ffffff; }
        body { font-family: 'Kanit', sans-serif; margin: 0; background-color: #f4f4f9; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        /* Hero */
        .hero { background: linear-gradient(135deg, var(--deep-blue), #1e293b); color: var(--white); padding: 60px 20px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 20px; }
        .cta-btn { background: var(--gold); color: var(--deep-blue); padding: 15px 30px; font-weight: 700; border-radius: 50px; text-decoration: none; display: inline-block; }

        /* Download Section */
        .download-box { background: #fff; padding: 30px; border-radius: 20px; margin: 20px 0; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .dl-btns { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .dl-btns img { height: 50px; }

        /* Screenshots */
        .sc-gallery { display: flex; overflow-x: auto; gap: 15px; padding: 20px 0; }
        .sc-gallery img { height: 250px; border-radius: 10px; }
        .sc-full { width: 100%; border-radius: 10px; margin-top: 10px; }
        
        .pdf-box { text-align: center; padding: 20px; }
        .pdf-link { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <section class="hero">
        <h1>แอป AI โหราศาสตร์เวทอินเดีย</h1>
        <p>ค้นพบเส้นทางชีวิตของคุณ ด้วย AI และศาสตร์โหราศาสตร์อินเดียโบราณ</p>
        <a href="#" class="cta-btn">ทดลองใช้ฟรีตอนนี้</a>
    </section>

    <main class="container">
        <section class="download-box">
            <h2>ดาวน์โหลดแอป</h2>
            <div class="dl-btns">
                <a href="#"><img src="download-ios.png" alt="iOS"></a>
                <a href="#"><img src="download-android.png" alt="Android"></a>
                <a href="#"><img src="download-pc.png" alt="PC"></a>
            </div>
        </section>

        <section>
            <h2>ภาพตัวอย่างการใช้งาน</h2>
            <div class="sc-gallery">
                <img src="sc-1.jpg" alt="UI 1"><img src="sc-2.png" alt="UI 2"><img src="sc-3.jpg" alt="UI 3"><img src="sc-4.png" alt="UI 4">
            </div>
            <img src="sc-PDF1.png" alt="PDF" class="sc-full">
            <img src="sc-mail.png" alt="Mail" class="sc-full">
            <div class="pdf-box">
                <a href="https://drive.google.com/file/d/15uv755RzFNNwFOxfUq4SSOApueuFyvJV/view?usp=sharing" target="_blank" class="pdf-link">ดูตัวอย่างรายงานผลลัพธ์ฉบับเต็ม (PDF)</a>
            </div>
        </section>
    </main>
</body>
</html>
